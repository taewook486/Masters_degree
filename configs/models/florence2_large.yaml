enabled: false  # Dropped: incompatible with transformers>=5.0 (EncoderDecoderCache breaks SA cache)
model_name: "florence2-large"
model_id: "microsoft/Florence-2-large"
model_class: "AutoModelForCausalLM"
processor_class: "AutoProcessor"

torch_dtype: "float16"
device_map: null  # Florence-2's DaViT is incompatible with accelerate meta tensors
trust_remote_code: true
attn_implementation: "eager"

generation:
  max_new_tokens: 128
  do_sample: false
  num_beams: 3
  use_cache: true

prompt_format: "direct_question"
