# Ablation C: Minimal target modules [q_proj, v_proj]
# Same as base_qlora.yaml defaults

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: float16
  bnb_4bit_use_double_quant: true

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
  bias: none
  task_type: CAUSAL_LM

training:
  learning_rate: 2.0e-4
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  max_seq_length: 2048
  warmup_ratio: 0.03
  weight_decay: 0.01
  lr_scheduler_type: cosine
  optim: paged_adamw_8bit
  gradient_checkpointing: true
  fp16: true
  bf16: false
  logging_steps: 10
  save_strategy: epoch

evaluation:
  eval_strategy: epoch
  metric_for_best_model: eval_accuracy

seed: 42
